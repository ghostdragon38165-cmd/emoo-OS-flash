<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web OS</title>
    <style>
        body { margin: 0; overflow: hidden; background: #2c3e50; font-family: Arial; }
        #desktop { background-image: url('IMG_1413.jpeg'); background-size: cover; background-position: center; width: 100vw; height: 100vh; position: absolute; z-index: -1; }
        .window { position: absolute; width: 300px; background: rgba(255, 255, 255, 0.2); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.3); border-radius: 10px; color: white; }
        .title-bar { background: rgba(0, 0, 0, 0.4); padding: 5px; cursor: move; display: flex; justify-content: space-between; border-radius: 8px 8px 0 0; touch-action: none; user-select: none; }
    </style>
</head>
<body>

    <div id="desktop"></div>

   <div id="terminal" class="window" style="display: block; top: 10%; left: 10%; width: 400px; height: 350px;">
    <div class="title-bar">
        Terminal 
        <span onclick="document.getElementById('terminal').style.display='none'" style="cursor:pointer;">X</span>
    </div>
    
    <div id="terminal-output" style="padding: 15px; height: 220px; overflow-y: auto; font-family: monospace; font-size: 16px; color: white; background: rgba(0,0,0,0.3);">
        System bereit... Warte auf Eingabe.<br>
    </div>
    
    <div style="display: flex; gap: 5px; padding: 10px;">
        <input type="text" id="term-input" placeholder="Befehl hier eingeben..." 
               style="flex-grow: 1; background: #fff; color: #000; border: 1px solid #ccc; padding: 8px; border-radius: 5px;">
        <button onclick="executeCommand()" style="background: #3498db; color: white; border: none; padding: 8px 15px; border-radius: 5px;">Run</button>
    </div>
</div>

<script>
    // 1. Terminal öffnen mit Alt + T
    document.addEventListener('keydown', function(e) {
        if (e.altKey && e.key === 't') {
            document.getElementById('terminal').style.display = 'block';
            document.getElementById('term-input').focus();
        }
    });

    // 2. Befehlslogik
    function executeCommand() {
        let input = document.getElementById('term-input');
        let output = document.getElementById('terminal-output');
        let cmd = input.value.toLowerCase().trim();
        if (cmd === "") return;
        output.innerHTML += "<div>> " + input.value + "</div>";
        
        if (cmd === "help") {
            output.innerHTML += "<div style='color: #aaa;'>Befehle: brightness [1-100], color [name], clear</div>";
        } else if (cmd.startsWith("brightness")) {
            document.body.style.filter = `brightness(${cmd.split(" ")[1]}%)`;
        } else if (cmd.startsWith("color")) {
            document.body.style.backgroundColor = cmd.split(" ")[1];
        } else if (cmd === "clear") {
            output.innerHTML = "";
        } else {
            output.innerHTML += "<div style='color: red;'>Unbekannter Befehl.</div>";
        }
        input.value = '';
        output.scrollTop = output.scrollHeight;
    }

    // 3. Fenster-Bewegungs-Logik (Touch & Maus)
    document.addEventListener('touchstart', dragStart, {passive: false});
    document.addEventListener('mousedown', dragStart);

    function dragStart(e) {
        let target = e.target.closest('.title-bar');
        if (!target) return;
        let windowEl = target.parentElement;
        let shiftX = (e.clientX || e.touches[0].clientX) - windowEl.getBoundingClientRect().left;
        let shiftY = (e.clientY || e.touches[0].clientY) - windowEl.getBoundingClientRect().top;

        function moveAt(pageX, pageY) {
            windowEl.style.left = (pageX - shiftX) + 'px';
            windowEl.style.top = (pageY - shiftY) + 'px';
        }
        function onMove(e) { moveAt(e.pageX || e.touches[0].pageX, e.pageY || e.touches[0].pageY); }
        document.addEventListener('mousemove', onMove);
        document.addEventListener('touchmove', onMove, {passive: false});
        document.onmouseup = document.ontouchend = function() {
            document.removeEventListener('mousemove', onMove);
            document.removeEventListener('touchmove', onMove);
        };
    }
</script>

</body>
</html>
