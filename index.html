<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web OS</title>
    <style>
        body { margin: 0; overflow: hidden; background: #2c3e50; font-family: Arial; }
        #desktop { background-image: url('IMG_1413.jpeg'); background-size: cover; background-position: center; background-repeat: no-repeat; background-attachment: fixed; width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; z-index: -1; }
        .window { position: absolute; width: 300px; background: rgba(255, 255, 255, 0.2); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.3); border-radius: 10px; color: white; }
        .title-bar { background: rgba(0, 0, 0, 0.4); color: white; padding: 5px; cursor: move; display: flex; justify-content: space-between; border-radius: 8px 8px 0 0; touch-action: none; user-select: none; }
    </style>
</head>
<body>

    <div id="desktop"></div>

    <div id="run-dialog" class="window" style="display: none; top: 30%; left: 35%;">
        <div class="title-bar">Run <span onclick="document.getElementById('run-dialog').style.display='none'" style="cursor:pointer;">X</span></div>
        <div style="padding: 10px;">
            <p>Befehl eingeben:</p>
            <input type="text" id="run-input" style="width: 90%;" onkeydown="if(event.key==='Enter') executeCommand()">
            <button onclick="executeCommand()">OK</button>
        </div>
    </div>

    <div id="terminal" class="window" style="display: none; top: 10%; left: 5%; width: 90%; height: 300px;">
        <div class="title-bar">Terminal <span onclick="document.getElementById('terminal').style.display='none'" style="cursor:pointer;">X</span></div>
        <div id="terminal-output" style="padding: 10px; height: 180px; overflow-y: auto; font-family: monospace; font-size: 14px; color: white;"></div>
        <div style="display: flex; gap: 5px; padding: 5px;">
            <input type="text" id="term-input" style="flex-grow: 1; background: #222; color: white; border: 1px solid #555;">
            <button onclick="executeCommand()">Run</button>
        </div>
    </div>

<script>
    // Tastatur-Shortcuts
    document.addEventListener('keydown', function(e) {
        if (e.altKey && e.key === 't') {
            document.getElementById('terminal').style.display = 'block';
            document.getElementById('term-input').focus();
        }
        if (e.altKey && e.key === 'r') {
            document.getElementById('run-dialog').style.display = 'block';
            document.getElementById('run-input').focus();
        }
    });

     // Einheitliche Befehlslogik mit adaptivem Modus
    function executeCommand() {
        let inputField = document.getElementById('term-input').value || document.getElementById('run-input').value;
        let output = document.getElementById('terminal-output');
        let cmd = inputField.toLowerCase().trim();
        
        if (cmd === "") return;
        output.innerHTML += "<div>> " + inputField + "</div>";
        
        if (cmd === "help") {
            output.innerHTML += "<div>Befehle: brightness [1-100], color [name/adaptive], clear</div>";
        } 
        else if (cmd.startsWith("brightness")) {
            document.body.style.filter = `brightness(${cmd.split(" ")[1]}%)`;
        } 
        else if (cmd === "color adaptive") {
            // Der adaptive Effekt: Das Terminal passt sich dem Hintergrund an
            let term = document.getElementById('terminal');
            term.style.backgroundColor = "rgba(255, 255, 255, 0.1)";
            term.style.backdropFilter = "invert(1) blur(10px)";
            term.style.webkitBackdropFilter = "invert(1) blur(10px)";
            output.innerHTML += "<div>Farbe auf 'adaptive' gesetzt.</div>";
        }
        else if (cmd.startsWith("color")) {
            let color = cmd.split(" ")[1];
            document.body.style.backgroundColor = color;
            document.getElementById('terminal').style.backdropFilter = "blur(10px)"; // Reset
            output.innerHTML += "<div>Farbe geändert.</div>";
        }
        else if (cmd === "clear") {
            output.innerHTML = "";
        }
        else {
            output.innerHTML += "<div style='color: red;'>Unbekannter Befehl.</div>";
        }
        
        document.getElementById('term-input').value = '';
        document.getElementById('run-input').value = '';
        output.scrollTop = output.scrollHeight;
        document.getElementById('run-dialog').style.display = 'none';
    }

</script>

</body>
</html>
