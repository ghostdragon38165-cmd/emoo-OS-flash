<!DOCTYPE html>
<html>
<head>
    <style>
        body { margin: 0; overflow: hidden; background: #2c3e50; font-family: Arial; }

        #desktop {
            background-image: url('IMG_1413.jpeg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            
            background-attachment: fixed;
            width: 100vw;
            height: 100vh;
            position: absolute;
            top: 0;
            left: 0;
            z-index: -1; 
        }

        .window { 
            position: absolute; 
            width: 300px; 
            background: rgba(255, 255, 255, 0.2); 
            backdrop-filter: blur(10px); 
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3); 
            border-radius: 10px;
            color: white; 
        }

        .title-bar { 
            background: rgba(0, 0, 0, 0.4); 
            color: white; 
            padding: 5px; 
            cursor: move; 
            display: flex; 
            justify-content: space-between; 
            border-radius: 8px 8px 0 0;
            touch-action: none; 
            user-select: none;
        }
    </style>
</head>
<body>

    <div id="desktop"></div>

    <div id="run-dialog" class="window" style="display: none; top: 30%; left: 35%;">
        <div class="title-bar">
            Run 
            <span onclick="document.getElementById('run-dialog').style.display='none'" style="cursor:pointer;">X</span>
        </div>
        <div class="content" style="padding: 10px;">
            <p>Geben Sie den Namen ein:</p>
            <input type="text" id="run-input" style="width: 90%;" onkeydown="if(event.key==='Enter') runCommand()">
            <button onclick="runCommand()">OK</button>
        </div>
    </div>

<div id="terminal" class="window" style="display: none; top: 10%; left: 5%; width: 90%; height: 300px;">
    <div class="title-bar">
        Terminal <span onclick="document.getElementById('terminal').style.display='none'" style="cursor:pointer;">X</span>
    </div>
    <div id="terminal-output" style="padding: 10px; height: 180px; overflow-y: auto; font-family: monospace; font-size: 14px; color: white;"></div>
    <div style="display: flex; gap: 5px; padding: 5px;">
        <input type="text" id="term-input" style="flex-grow: 1; background: #222; color: white; border: 1px solid #555;" autofocus>
        <button onclick="executeCommand()" style="background: #444; color: white; border: none; padding: 5px 10px;">Run</button>
    </div>
</div>

<script>
    // Terminal öffnen mit Alt + T
    document.addEventListener('keydown', function(e) {
        if (e.altKey && e.key === 't') {
            document.getElementById('terminal').style.display = 'block';
            document.getElementById('term-input').focus();
        }
    });

    // Befehlslogik
    function executeCommand() {
        let input = document.getElementById('term-input');
        let output = document.getElementById('terminal-output');
        let cmd = input.value.toLowerCase().trim();
        
        if (cmd === "") return;

        output.innerHTML += "<div>> " + input.value + "</div>";
        
        if (cmd === "help") {
            output.innerHTML += "<div style='color: #aaa;'>Befehle: brightness [1-100], color [name], clear</div>";
        } 
        else if (cmd.startsWith("brightness")) {
            let val = cmd.split(" ")[1];
            document.body.style.filter = `brightness(${val}%)`;
            output.innerHTML += "<div>Helligkeit: " + val + "%</div>";
        }
        else if (cmd.startsWith("color")) {
            let color = cmd.split(" ")[1];
            document.body.style.backgroundColor = color;
            output.innerHTML += "<div>Farbe geändert.</div>";
        }
        else if (cmd === "clear") {
            output.innerHTML = "";
        }
        else {
            output.innerHTML += "<div style='color: red;'>Unbekannter Befehl.</div>";
        }

        input.value = '';
        output.scrollTop = output.scrollHeight;
        input.focus();
    }
</script>

    
 <script src="kernel.js"></script>
    
</body>
</html>
