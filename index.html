<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web OS</title>
    <style>
        body { margin: 0; overflow: hidden; background: #2c3e50; font-family: Arial; }
        #desktop { background-image: url('IMG_1413.jpeg'); background-size: cover; background-position: center; background-repeat: no-repeat; background-attachment: fixed; width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; z-index: -1; }
        .window { position: absolute; width: 320px; height: 250px; background: rgba(255, 255, 255, 0.2); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.3); border-radius: 10px; color: white; display: none; }
        .title-bar { background: rgba(0, 0, 0, 0.4); color: white; padding: 5px; cursor: move; display: flex; justify-content: space-between; border-radius: 8px 8px 0 0; touch-action: none; user-select: none; }
        #taskbar { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); min-width: 80px; height: 80px; background: rgba(0,0,0,0.3); border-radius: 40px; display: flex; align-items: center; justify-content: center; gap: 15px; padding: 0 15px; transition: all 0.4s ease; z-index: 1000; }
        .icon { width: 60px; height: 60px; cursor: pointer; border-radius: 50%; border: 2px solid white; box-shadow: 0 0 10px rgba(0,0,0,0.5); }
        #app-icon, #browser-icon, #notes-icon { display: none; } 
    </style>
</head>
<body onload="loadState()">

    <div id="desktop"></div>

    <div id="taskbar">
        <img src="IMG_1419.jpeg" class="icon" onclick="toggleTaskbar()">
        <img src="IMG_1422.jpeg" id="app-icon" class="icon" onclick="toggleWindow('terminal')">
        <img src="IMG_1426.jpeg" id="browser-icon" class="icon" onclick="toggleWindow('browser')">
        <img src="IMG_1427.jpeg" id="notes-icon" class="icon" onclick="toggleWindow('notes')">
    </div>

    <div id="run-dialog" class="window" style="top: 30%; left: 35%;"><div class="title-bar">Run <span onclick="toggleWindow('run-dialog')" style="cursor:pointer;">X</span></div><div style="padding:10px;"><input type="text" id="run-input" onkeydown="if(event.key==='Enter') executeCommand()"></div></div>
    <div id="browser" class="window" style="top: 15%; left: 10%;"><div class="title-bar">Suche <span onclick="toggleWindow('browser')" style="cursor:pointer;">X</span></div><div style="padding:10px;"><input type="text" id="browser-url"><button onclick="openSearch()">Go</button></div></div>
    <div id="notes" class="window" style="top: 10%; left: 60%;"><div class="title-bar">Notizen <span onclick="toggleWindow('notes')" style="cursor:pointer;">X</span></div><textarea id="note-area" oninput="saveState()" style="width:90%; height:70%; background:transparent; color:white;"></textarea></div>
    <div id="terminal" class="window" style="display:block; top: 10%; left: 5%;"><div class="title-bar">Terminal <span onclick="toggleWindow('terminal')" style="cursor:pointer;">X</span></div><div id="terminal-output" style="height:140px; overflow-y:auto; padding:10px;"></div><div style="padding:5px;"><input type="text" id="term-input"><button onclick="executeCommand()">Run</button></div></div>

<script>
    // 1. Speicher Logik
    function saveState() {
        let state = {
            notes: document.getElementById('note-area').value,
            pos: {
                terminal: {l: document.getElementById('terminal').style.left, t: document.getElementById('terminal').style.top},
                browser: {l: document.getElementById('browser').style.left, t: document.getElementById('browser').style.top},
                notes: {l: document.getElementById('notes').style.left, t: document.getElementById('notes').style.top}
            }
        };
        localStorage.setItem('webOS_State', JSON.stringify(state));
    }

    function loadState() {
        let saved = localStorage.getItem('webOS_State');
        if (!saved) return;
        let s = JSON.parse(saved);
        document.getElementById('note-area').value = s.notes;
        ['terminal', 'browser', 'notes'].forEach(id => {
            document.getElementById(id).style.left = s.pos[id].l;
            document.getElementById(id).style.top = s.pos[id].t;
        });
    }

    // 2. Terminal Befehle (Hier ist alles wieder drin!)
    function executeCommand() {
        let input = document.getElementById('term-input').value || document.getElementById('run-input').value;
        let out = document.getElementById('terminal-output');
        let cmd = input.toLowerCase().trim();
        if (cmd === "") return;
        out.innerHTML += "<div>> " + input + "</div>";
        
        if (cmd.startsWith("wp ")) {
            let n = cmd.split(" ")[1];
            let wps = {"1": "IMG_1413.jpeg", "2": "IMG_1423.jpeg", "3": "IMG_1425.jpeg"};
            if (wps[n]) document.getElementById('desktop').style.backgroundImage = `url('${wps[n]}')`;
        } else if (cmd === "help") {
            out.innerHTML += "<div>Befehle: brightness, color, wp [1-3], clear, google [suche], color adaptive</div>";
        } else if (cmd.startsWith("brightness ")) {
            document.body.style.filter = `brightness(${cmd.split(" ")[1]}%)`;
        } else if (cmd === "color adaptive") {
            document.getElementById('terminal').style.backgroundColor = "rgba(255,255,255,0.1)";
        } else if (cmd.startsWith("color ")) {
            document.body.style.backgroundColor = cmd.split(" ")[1];
        } else if (cmd === "clear") {
            out.innerHTML = "";
        } else if (cmd.startsWith("google ")) {
            window.open('https://www.google.com/search?q=' + encodeURIComponent(cmd.substring(7)), '_blank');
        } else {
            out.innerHTML += "<div style='color:red;'>Fehler: Befehl unbekannt.</div>";
        }
        document.getElementById('term-input').value = '';
        document.getElementById('run-input').value = '';
        saveState();
    }

    // 3. Taskbar & Fenster & Drag
    function toggleTaskbar() {
        let display = (document.getElementById('app-icon').style.display === "none") ? "block" : "none";
        ['app-icon', 'browser-icon', 'notes-icon'].forEach(id => document.getElementById(id).style.display = display);
        document.getElementById('taskbar').style.minWidth = (display === "block") ? "320px" : "80px";
    }

    function toggleWindow(id) {
        let el = document.getElementById(id);
        el.style.display = (el.style.display === "none" || el.style.display === "") ? "block" : "none";
    }

    function openSearch() {
        window.open('https://www.google.com/search?q=' + encodeURIComponent(document.getElementById('browser-url').value), '_blank');
    }

    document.addEventListener('mousedown', (e) => {
        let t = e.target.closest('.title-bar');
        if (!t) return;
        let win = t.parentElement;
        let shiftX = e.clientX - win.getBoundingClientRect().left;
        let shiftY = e.clientY - win.getBoundingClientRect().top;
        function move(e) { win.style.left = (e.clientX - shiftX) + 'px'; win.style.top = (e.clientY - shiftY) + 'px'; }
        document.addEventListener('mousemove', move);
        document.addEventListener('mouseup', () => { document.removeEventListener('mousemove', move); saveState(); }, {once: true});
    });
</script>
</body>
</html>
